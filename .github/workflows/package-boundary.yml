name: Package boundary

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject development-only content
        shell: bash
        run: |
          set -euo pipefail

          forbidden_dirs=(
            "docs"
            "logs"
            "upstream"
            "examples"
            "html-report-skill-mvp-dev"
            "tests"
            ".frontend-slides"
          )

          for dir in "${forbidden_dirs[@]}"; do
            if [[ -e "$dir" ]]; then
              echo "::error file=$dir::Development-only directory must not be included in the release repository."
              exit 1
            fi
          done

          if find . \
            -path './.git' -prune -o \
            -type f \( -name 'test_*.py' -o -name '*_test.py' \) -print |
            grep -q .; then
            echo "::error::Development test files must not be included in the release repository."
            find . \
              -path './.git' -prune -o \
              -type f \( -name 'test_*.py' -o -name '*_test.py' \) -print
            exit 1
          fi

      - name: Enforce top-level release allowlist
        shell: bash
        run: |
          set -euo pipefail

          allowed="$(
            printf '%s\n' \
              ".git" \
              ".github" \
              ".gitignore" \
              "LICENSE" \
              "README.md" \
              "README_EN.md" \
              "SECURITY.md" \
              "SKILL.md" \
              "assets" \
              "references" \
              "scripts" |
              sort
          )"
          actual="$(find . -mindepth 1 -maxdepth 1 -printf '%f\n' | sort)"

          if [[ "$actual" != "$allowed" ]]; then
            echo "::error::Unexpected top-level release repository entries found."
            echo "Allowed:"
            printf '%s\n' "$allowed"
            echo "Actual:"
            printf '%s\n' "$actual"
            exit 1
          fi

      - name: Enforce runtime script allowlist
        shell: bash
        run: |
          set -euo pipefail

          expected="$(
            printf '%s\n' \
              "content_coverage.py" \
              "deploy.sh" \
              "export-pdf.sh" \
              "extract-pptx.py" \
              "validate.py" |
              sort
          )"
          actual="$(find scripts -maxdepth 1 -type f -printf '%f\n' | sort)"

          if [[ "$actual" != "$expected" ]]; then
            echo "::error file=scripts::The installable skill may contain only approved runtime scripts."
            echo "Expected:"
            printf '%s\n' "$expected"
            echo "Actual:"
            printf '%s\n' "$actual"
            exit 1
          fi

      - name: Verify runtime files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "SKILL.md"
            "LICENSE"
            "scripts/validate.py"
            "scripts/content_coverage.py"
            "scripts/extract-pptx.py"
            "scripts/deploy.sh"
            "scripts/export-pdf.sh"
            "references/style-presets/index.json"
          )

          for file in "${required_files[@]}"; do
            test -f "$file" || {
              echo "::error file=$file::Required runtime file is missing."
              exit 1
            }
          done

          python3 -m py_compile \
            scripts/validate.py \
            scripts/content_coverage.py \
            scripts/extract-pptx.py
          bash -n scripts/deploy.sh scripts/export-pdf.sh
